# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        entry: ./node_modules/.bin/prettier --write --ignore-unknown
        language: system
        types: [text]
        files: \.(ts|tsx|js|jsx|svelte|json|jsonc|yml|yaml|md|css|html)$
        pass_filenames: true
      - id: rustfmt
        name: Rustfmt
        entry: rustfmt --edition 2021
        language: system
        types: [rust]
        files: \.rs$
        pass_filenames: true
